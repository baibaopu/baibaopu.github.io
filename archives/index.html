<div id="kanban-toast"></div>

<script src="https://unpkg.com/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>
<script>
  (function(){
    var models = [
      { name: "初音", id: "miku", hello: "ミクだよ〜！" },
      { name: "小春", id: "koharu", hello: "今天天气真好呢~" },
      { name: "しずく", id: "shizuku", hello: "...嗯，你好。" },
      { name: "いずみ", id: "izumi", hello: "看书吗？一起吧。" }
    ];

    
    var currentIndex = parseInt(localStorage.getItem('kanbanModelIndex') || '0', 10);
    if (isNaN(currentIndex) || currentIndex < 0 || currentIndex >= models.length) currentIndex = 0;
    var m = models[currentIndex];

    
    var _parts = window.location.pathname.split('/');
    var _root = '/';
    if (_parts.length > 1 && _parts[1]) { _root = '/' + _parts[1] + '/'; }
    var modelJsonPath = _root + 'live2d-widget-model-' + m.id + '/assets/' + m.id + '.model.json';

    
    L2Dwidget.init({
      model: { jsonPath: modelJsonPath },
      display: { superSample: 2, width: 160, height: 320, position: "right", hOffset: 0, vOffset: 0 },
      mobile: { show: true, scale: 0.5, motion: false },
      dialog: { enable: false },
      debug: false
    });

    
    (function(){
      var _check = function(){
        var container = document.getElementById('live2d-widget');
        if (!container) {
          showToast('看板娘容器未创建（检查模型路径）');
          console.error('live2d: container missing, modelJsonPath=', modelJsonPath);
          return;
        }
        var canvas = container.querySelector('canvas');
        if (!canvas) {
          showToast('看板娘容器存在，但画布未创建（模型加载失败）');
          console.error('live2d: canvas missing — model may have failed to load');
          return;
        }
        showToast('看板娘加载成功');
      };
      setTimeout(_check, 1500);
    })();

    function showToast(msg){
      var t = document.getElementById('kanban-toast'); if(!t) return; t.textContent = msg; t.classList.add('show'); clearTimeout(showToast._t); showToast._t = setTimeout(function(){ t.classList.remove('show'); }, 2200);
    }

    function updateLocalReadingCount(){
      try {
        var els = document.querySelectorAll('.local-reading-count[data-reading-path]');
        if (!els.length) return;
        els.forEach(function(el){
          var path = el.getAttribute('data-reading-path') || window.location.pathname;
          var key = 'local-reading-count:' + path;
          var count = parseInt(localStorage.getItem(key), 10) || 0;
          count += 1;
          localStorage.setItem(key, count);
          el.textContent = count;
        });
      } catch (err) {
        console.error('阅读次数统计失败：', err);
      }
    }

    function updateServerReadingCount(){
      try {
        var els = document.querySelectorAll('.local-reading-count[data-reading-path]');
        if (!els.length) return;
        var rawPath = els[0].getAttribute('data-reading-path') || window.location.pathname;
        var keyPath = rawPath.replace(/^\//, '').replace(/\/$/, '').replace(/\//g, '_') || 'home';
        var namespace = 'baibaopu.github.io';
        var url = 'https://api.countapi.xyz/hit/' + namespace + '/' + encodeURIComponent(keyPath);

        fetch(url).then(function(response){
          return response.json();
        }).then(function(data){
          if (data && typeof data.value !== 'undefined') {
            els.forEach(function(el){ el.textContent = data.value; });
          } else {
            updateLocalReadingCount();
          }
        }).catch(function(err){
          console.error('服务器阅读统计失败：', err);
          updateLocalReadingCount();
        });
      } catch (err) {
        console.error('服务器阅读统计失败：', err);
        updateLocalReadingCount();
      }
    }

    updateServerReadingCount();
    showToast(m.name + '：' + m.hello);

    function bindClick(){
      var canvas = document.querySelector('#live2d-widget canvas');
      if (!canvas) { setTimeout(bindClick, 300); return; }
      canvas.addEventListener('click', function(){
        var next = (currentIndex + 1) % models.length;
        localStorage.setItem('kanbanModelIndex', next.toString());
        location.reload();
      });
    }

    document.addEventListener('DOMContentLoaded', function(){ bindClick(); });
  })();
</script>
